<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LogicCanvas | STEM Visualiser</title>
    <script>
      window.tailwind = {
        config: {
          darkMode: "class",
          theme: {
            extend: {
              fontFamily: {
                sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
              }
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html {
        color-scheme: light;
        background: #eef4f2;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: #eef4f2;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      :where(button, input, select, textarea, iframe):focus-visible {
        outline: 3px solid rgba(94, 234, 212, 0.85);
        outline-offset: 3px;
      }

      ::selection {
        background: rgba(45, 212, 191, 0.3);
      }

      @keyframes lc-rise {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes lc-shimmer {
        from { background-position: 120% 0; }
        to { background-position: -120% 0; }
      }

      @keyframes lc-pulse-soft {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }

      .lc-enter {
        animation: lc-rise 420ms cubic-bezier(.22, 1, .36, 1) both;
      }

      .lc-skeleton {
        background: linear-gradient(100deg, rgba(255,255,255,.055) 20%, rgba(255,255,255,.13) 38%, rgba(255,255,255,.055) 55%);
        background-size: 220% 100%;
        animation: lc-shimmer 1.6s ease-in-out infinite;
      }

      .lc-live-dot {
        animation: lc-pulse-soft 1.8s ease-in-out infinite;
      }

      .lc-contained {
        contain: layout paint style;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 1ms !important;
        }
      }

      html[data-theme="light"] {
        color-scheme: light;
        background: #eef4f2;
      }

      html[data-theme="light"] body {
        background: #eef4f2;
      }

      html[data-theme="light"] main {
        background: transparent !important;
        color: #172033 !important;
      }

      html[data-theme="light"] header {
        border-color: #d7e3e0 !important;
        background: rgba(238, 244, 242, 0.94) !important;
      }

      html[data-theme="light"] main [class*="bg-white/"] {
        background: rgba(255, 255, 255, 0.78) !important;
      }

      html[data-theme="light"] main [class*="bg-slate-950"] {
        background: #ffffff !important;
      }

      html[data-theme="light"] .lc-teacher-surface {
        border-color: #d7e3e0 !important;
        background: #ffffff !important;
        box-shadow: 0 12px 30px rgba(15, 47, 53, 0.08) !important;
      }

      html[data-theme="light"] .lc-teacher-surface [class*="bg-slate-800"],
      html[data-theme="light"] .lc-teacher-surface [class*="bg-slate-900"] {
        background: #f4f8f7 !important;
      }

      html[data-theme="light"] .lc-teacher-pack {
        border-color: #a7d9d0 !important;
        background: #effaf7 !important;
        box-shadow: 0 12px 30px rgba(15, 47, 53, 0.06) !important;
      }

      html[data-theme="light"] .lc-home-card {
        border-color: #d7e3e0 !important;
        background: #ffffff !important;
        box-shadow: 0 8px 20px rgba(15, 47, 53, 0.05) !important;
      }

      html[data-theme="light"] .lc-home-card:hover {
        border-color: #14b8a6 !important;
        background: #f0fdfa !important;
        box-shadow: 0 12px 26px rgba(13, 148, 136, 0.12) !important;
      }

      html[data-theme="light"] #logiccanvas-simulation {
        border-color: #d7e3e0 !important;
        background: #ffffff !important;
        box-shadow: 0 12px 30px rgba(15, 47, 53, 0.08) !important;
      }

      html[data-theme="light"] #logiccanvas-simulation > div:first-child {
        border-color: #d7e3e0 !important;
        background: #ffffff !important;
      }

      html[data-theme="light"] .lc-unsupported-notice {
        border-color: #fbbf24 !important;
        background: #fffbeb !important;
        box-shadow: 0 10px 24px rgba(146, 64, 14, 0.08) !important;
      }

      html[data-theme="light"] .lc-unsupported-title {
        color: #92400e !important;
      }

      html[data-theme="light"] .lc-unsupported-copy {
        color: #78350f !important;
      }

      html[data-theme="light"] .lc-unsupported-dismiss {
        color: #a16207 !important;
      }

      html[data-theme="light"] main [class*="border-white/"] {
        border-color: #d7e3e0 !important;
      }

      html[data-theme="light"] main [class*="text-white"] {
        color: #172033 !important;
      }

      html[data-theme="light"] main h1,
      html[data-theme="light"] main h2,
      html[data-theme="light"] main h3,
      html[data-theme="light"] main h4 {
        color: #0f172a !important;
      }

      html[data-theme="light"] main [class*="text-slate-100"] {
        color: #243447 !important;
      }

      html[data-theme="light"] main [class*="text-slate-200"] {
        color: #334155 !important;
      }

      html[data-theme="light"] main [class*="text-slate-300"] {
        color: #475569 !important;
      }

      html[data-theme="light"] main [class*="text-slate-400"] {
        color: #64748b !important;
      }

      html[data-theme="light"] main [class*="text-slate-500"] {
        color: #7c8b99 !important;
      }

      html[data-theme="light"] main input,
      html[data-theme="light"] main select,
      html[data-theme="light"] main textarea {
        border-color: #cbd9d6 !important;
        background: #ffffff !important;
        color: #172033 !important;
      }

      html[data-theme="light"] main input::placeholder,
      html[data-theme="light"] main textarea::placeholder {
        color: #84939f !important;
      }

      html[data-theme="light"] main button:not([class*="bg-teal-300"]):not([class*="bg-amber-300"]) {
        color: #334155 !important;
        border-color: #cbd9d6 !important;
        background: rgba(255, 255, 255, 0.72) !important;
      }

      html[data-theme="light"] main [class*="bg-white/[0.04]"] {
        background: #f4f8f7 !important;
      }

      html[data-theme="light"] main [class*="bg-white/[0.05]"] {
        background: #f4f8f7 !important;
      }

      html[data-theme="light"] main [class*="bg-teal-300/10"] {
        background: #e7f7f3 !important;
      }

      html[data-theme="light"] main [class*="bg-slate-950/50"],
      html[data-theme="light"] main [class*="bg-slate-950/60"],
      html[data-theme="light"] main [class*="bg-slate-950/70"] {
        background: #ffffff !important;
      }

      html[data-theme="light"] main [class*="text-teal-50"] {
        color: #134e4a !important;
      }

      html[data-theme="light"] main [class*="text-teal-100"] {
        color: #115e59 !important;
      }

      html[data-theme="light"] main [class*="text-teal-200"] {
        color: #0f766e !important;
      }

      html[data-theme="light"] main [class*="text-teal-300"] {
        color: #0f766e !important;
      }

      html[data-theme="light"] main [class*="text-slate-950"] {
        color: #0f2f35 !important;
      }

      html[data-theme="light"] main [class*="border-teal-300/20"],
      html[data-theme="light"] main [class*="border-teal-200/10"] {
        border-color: #a7d9d0 !important;
      }

      html[data-theme="light"] main [class~="bg-teal-300"] {
        background: #5eead4 !important;
      }

      .lc-classroom-controls .lc-classroom-range {
        height: 1.3rem;
        cursor: pointer;
      }

      .lc-classroom-controls .lc-classroom-range::-webkit-slider-runnable-track {
        height: 0.5rem;
        border-radius: 999px;
        background: #475569;
      }

      .lc-classroom-controls .lc-classroom-range::-webkit-slider-thumb {
        width: 1.3rem;
        height: 1.3rem;
        margin-top: -0.4rem;
        appearance: none;
        border: 3px solid #0f172a;
        border-radius: 999px;
        background: #5eead4;
        box-shadow: 0 0 0 2px rgba(94, 234, 212, 0.25);
      }

      .lc-classroom-controls .lc-classroom-range::-moz-range-track {
        height: 0.5rem;
        border-radius: 999px;
        background: #475569;
      }

      .lc-classroom-controls .lc-classroom-range::-moz-range-thumb {
        width: 1.3rem;
        height: 1.3rem;
        border: 3px solid #0f172a;
        border-radius: 999px;
        background: #5eead4;
        box-shadow: 0 0 0 2px rgba(94, 234, 212, 0.25);
      }

      .lc-print-sheet {
        display: none;
      }

      @page {
        size: letter;
        margin: 0.42in;
      }

      @media print {
        html,
        body {
          background: #ffffff !important;
          color: #172033 !important;
        }

        body * {
          visibility: hidden;
        }

        #root {
          display: none !important;
        }

        .lc-print-sheet,
        .lc-print-sheet * {
          visibility: visible;
        }

        .lc-print-sheet {
          display: block;
          background: #ffffff;
          color: #172033;
          font-family: Inter, ui-sans-serif, system-ui, sans-serif;
          font-size: 10pt;
          line-height: 1.38;
        }

        .lc-print-page {
          box-sizing: border-box;
          display: flex;
          min-height: 9.95in;
          flex-direction: column;
          break-after: page;
          page-break-after: always;
        }

        .lc-print-page:last-of-type {
          break-after: auto;
          page-break-after: auto;
        }

        .lc-print-sheet h1,
        .lc-print-sheet h2,
        .lc-print-sheet h3,
        .lc-print-sheet p {
          margin: 0;
        }

        .lc-print-heading {
          display: grid;
          gap: 3px;
          border-bottom: 2px solid #0f766e;
          padding: 0 0 10px;
        }

        .lc-print-heading p {
          color: #0f766e;
          font-size: 8pt;
          font-weight: 700;
          letter-spacing: .08em;
          text-transform: uppercase;
        }

        .lc-print-heading h1 {
          font-size: 20pt;
          line-height: 1.12;
        }

        .lc-print-heading span {
          color: #475569;
          font-size: 9pt;
        }

        .lc-print-summary,
        .lc-print-two-column,
        .lc-print-challenges,
        .lc-print-support-grid,
        .lc-print-exit-ticket {
          margin-top: 12px;
        }

        .lc-print-sheet h2 {
          color: #0f766e;
          font-size: 9pt;
          font-weight: 700;
          letter-spacing: .06em;
          text-transform: uppercase;
        }

        .lc-print-summary p,
        .lc-print-two-column p {
          margin-top: 4px;
        }

        .lc-print-two-column {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 18px;
        }

        .lc-print-two-column section {
          min-height: 72px;
          border: 1px solid #cbd5e1;
          border-radius: 4px;
          padding: 9px;
        }

        .lc-print-two-column code {
          display: block;
          margin-top: 6px;
          color: #0f766e;
          font-size: 11pt;
          font-weight: 700;
        }

        .lc-print-two-column ul {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 3px 10px;
          margin: 6px 0 0;
          padding: 0;
          list-style: none;
        }

        .lc-print-challenges {
          display: grid;
          gap: 8px;
        }

        .lc-print-challenges article {
          break-inside: avoid;
          border-top: 1px solid #cbd5e1;
          padding-top: 7px;
        }

        .lc-print-challenges h3 {
          font-size: 10pt;
        }

        .lc-print-challenges p {
          margin-top: 3px;
        }

        .lc-print-response {
          min-height: 30px;
          margin-top: 6px;
          border-bottom: 1px solid #94a3b8;
          color: #64748b;
          font-size: 9pt;
        }

        .lc-print-support-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px;
        }

        .lc-print-support-grid section,
        .lc-print-exit-ticket {
          break-inside: avoid;
          border: 1px solid #cbd5e1;
          border-radius: 4px;
          padding: 9px;
        }

        .lc-print-support-grid ul,
        .lc-print-support-grid ol {
          display: grid;
          gap: 5px;
          margin: 6px 0 0;
          padding-left: 16px;
        }

        .lc-print-support-grid li {
          padding-left: 2px;
        }

        .lc-print-exit-ticket p {
          margin-top: 5px;
        }

        .lc-print-exit-ticket div {
          height: 22px;
          margin-top: 7px;
          border-bottom: 1px solid #94a3b8;
        }

        .lc-print-footer {
          margin-top: auto;
          border-top: 1px solid #cbd5e1;
          padding-top: 7px;
          color: #475569;
          font-size: 8.5pt;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
